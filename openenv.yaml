# openenv.yaml
# KisanEnv 2.0 — OpenEnv Framework Configuration

name: kisanenv
version: "2.0.0"
description: >
  Multi-agent Indian agricultural simulation environment for LLM reinforcement
  learning. Trains agents to make sequential farming decisions under uncertainty
  across a 90-day cotton growing season.

# Entry point
environment:
  module: env
  class: KisanEnv
  config: {}

# Server configuration
server:
  module: run
  host: 0.0.0.0
  port: 7860
  health_endpoint: /health

# Observation and action space types
spaces:
  observation:
    type: text
    description: "Formatted LLM prompt describing farm state, market, and available actions"
    max_length: 2048
  action:
    type: text
    description: "LLM output in ACTION: / REASONING: format"
    max_length: 512

# Episode configuration
episode:
  max_steps: 90
  early_termination: true
  termination_conditions:
    - "budget <= -5000"
    - "crop_health <= 0.0"

# Themes
themes:
  primary: multi-agent
  secondary:
    - long-horizon-planning
    - world-modeling
    - self-improvement
  wild_card: theory-of-mind

# Training defaults
training:
  framework: trl
  algorithm: grpo
  model: unsloth/Qwen2.5-3B-Instruct
  max_episodes: 300
  checkpoint_every: 50

# Metrics to track
metrics:
  - episode_reward
  - crop_yield
  - net_profit
  - soil_health_delta
  - reasoning_quality_avg
  - oversight_score_avg
  - curriculum_difficulty
  - insurance_enrollment_rate
