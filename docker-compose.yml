# docker-compose.yml
version: "3.9"

services:
  kisanenv:
    build: .
    ports:
      - "7860:7860"
    environment:
      - KISANENV_LLM_BACKEND=mock
    volumes:
      - .:/app               # Mount code for hot-reload
      - ./checkpoints:/app/checkpoints
    command: uvicorn run:app --host 0.0.0.0 --port 7860 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
